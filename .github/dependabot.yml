version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - go

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action/*"
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - npm
