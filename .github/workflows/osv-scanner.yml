name: osv-scanner

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "29 7 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: osv-scanner-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: osv / source advisory
    if: ${{ github.event.repository.private == false || vars.ENABLE_CODE_SCANNING == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run OSV source scan
        run: |
          set -euo pipefail
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.4.0
          scanner_bin="$(go env GOPATH)/bin/osv-scanner"
          mkdir -p artifacts/osv
          set +e
          "$scanner_bin" scan source \
            --include-git-root \
            --recursive \
            --format sarif \
            --output-file artifacts/osv/osv-results.sarif \
            ./
          scanner_status="$?"
          set -e
          test -s artifacts/osv/osv-results.sarif
          if [ "$scanner_status" -gt 1 ]; then
            exit "$scanner_status"
          fi

      - name: Upload OSV SARIF artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-sarif-${{ github.sha }}
          path: artifacts/osv/osv-results.sarif
          if-no-files-found: error
          retention-days: 14

  upload-sarif:
    name: osv / provider upload
    if: ${{ github.event_name != 'pull_request' && (github.event.repository.private == false || vars.ENABLE_CODE_SCANNING_UPLOAD == 'true') }}
    needs: scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Download OSV SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: osv-sarif-${{ github.sha }}
          path: artifacts/osv

      - name: Upload OSV SARIF
        uses: github/codeql-action/upload-sarif@24ea975727876cf496b1eb0c5b36e96e01600b51 # v4.37.0
        with:
          sarif_file: artifacts/osv/osv-results.sarif
          category: osv-source-advisory
