name: scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: "41 7 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    name: scorecard / repository hygiene
    if: ${{ github.event.repository.private == false || vars.ENABLE_SCORECARD == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      checks: read
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          publish_results: false
          results_file: scorecard-results.sarif
          results_format: sarif

      - name: Upload Scorecard SARIF artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif-${{ github.sha }}
          path: scorecard-results.sarif
          if-no-files-found: warn
          retention-days: 14

  upload-sarif:
    name: scorecard / provider upload
    if: ${{ github.event.repository.private == false || vars.ENABLE_SCORECARD_PUBLISH == 'true' }}
    needs: scorecard
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Download Scorecard SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scorecard-sarif-${{ github.sha }}
          path: artifacts/scorecard

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@24ea975727876cf496b1eb0c5b36e96e01600b51 # v4.37.0
        with:
          sarif_file: artifacts/scorecard/scorecard-results.sarif
          category: scorecard-repository-hygiene

  publish:
    name: scorecard / public publish
    if: ${{ github.event.repository.private == false || vars.ENABLE_SCORECARD_PUBLISH == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      checks: read
      contents: read
      id-token: write
      issues: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Publish Scorecard results
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          publish_results: true
          results_file: scorecard-public-results.json
          results_format: json
