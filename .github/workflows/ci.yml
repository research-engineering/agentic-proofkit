name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  source-quality:
    name: quality / source
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Install verified npm
        uses: ./.github/actions/setup-verified-npm

      - name: Install locked browser tooling
        run: npm ci --ignore-scripts

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Verify diff hygiene
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git rev-parse --verify HEAD^1 >/dev/null
            git diff --check HEAD^1 HEAD
          else
            git show --check --format= HEAD
          fi

      - name: Verify npm version
        run: npm run npm:version

      - name: Verify source hygiene
        run: npm run source-hygiene

      - name: Verify text policy
        run: npm run text-policy

      - name: Verify Mermaid diagrams
        run: npm run mermaid:check

      - name: Verify browser source types
        run: npm run browser:static-check

      - name: Verify Go formatting
        run: npm run go:fmt

      - name: Verify generated command family catalog
        run: npm run command-family:check

      - name: Run all Go tests
        run: npm run go:test

      - name: Run Go vet
        run: npm run go:vet

      - name: Run staticcheck
        run: npm run go:staticcheck

      - name: Run actionlint
        run: npm run go:actionlint

      - name: Run govulncheck
        run: npm run go:vulncheck

      - name: Build and verify package artifacts
        run: npm run package:artifact

      - name: Verify self-hosting receipts
        run: npm run self:receipt

      - name: Verify self-hosting coverage
        run: npm run self:coverage

      - name: Verify release closeout
        run: npm run release:closeout

      - name: Upload package tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agentic-proofkit-npm-package-${{ github.sha }}
          path: |
            artifacts/package/*.tgz
            artifacts/package/npm-pack.json
            artifacts/proofkit/*.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  platform-smoke:
    name: quality / platform smoke / macos-15
    runs-on: macos-15
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Install verified npm
        uses: ./.github/actions/setup-verified-npm

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run platform smoke
        run: |
          set -euo pipefail
          npm run npm:version
          npm run platform:smoke

  browser-runtime:
    name: quality / browser runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Install verified npm
        uses: ./.github/actions/setup-verified-npm

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install locked browser tooling
        run: npm ci --ignore-scripts

      - name: Install pinned browser engines
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run browser proof
        run: npm run browser:check

      - name: Upload browser proof
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-runtime-proof-${{ github.sha }}
          path: artifacts/proofkit/browser-runtime-proof.json
          if-no-files-found: error
          retention-days: 14

  ci-required-gate:
    name: quality / required aggregate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - browser-runtime
      - source-quality
      - platform-smoke
    steps:
      - name: Verify required quality results
        run: |
          set -euo pipefail
          test "${{ needs.browser-runtime.result }}" = "success"
          test "${{ needs.source-quality.result }}" = "success"
          test "${{ needs.platform-smoke.result }}" = "success"
          printf 'OK: all required quality checks passed\n'
