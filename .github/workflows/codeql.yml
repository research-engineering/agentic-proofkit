name: codeql

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  analyze:
    name: codeql / go
    if: ${{ github.event.repository.private == false || vars.ENABLE_CODE_SCANNING == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
          build-mode: autobuild

      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          output: codeql-results
          upload: ${{ (github.event.repository.private == false || vars.ENABLE_CODE_SCANNING_UPLOAD == 'true') && 'always' || 'never' }}
          upload-database: ${{ github.event.repository.private == false || vars.ENABLE_CODE_SCANNING_UPLOAD == 'true' }}
          wait-for-processing: ${{ github.event.repository.private == false || vars.ENABLE_CODE_SCANNING_UPLOAD == 'true' }}

      - name: Upload CodeQL SARIF artifact
        if: ${{ always() && steps.analyze.outputs.sarif-output != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-sarif-${{ github.sha }}
          path: codeql-results/*.sarif
          if-no-files-found: error
          retention-days: 14
